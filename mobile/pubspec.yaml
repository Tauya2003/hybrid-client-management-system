name: mfi_mobile
description: Hybrid Cloud Offline Client Management System - Field Officer App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database (Drift ORM + SQLCipher encryption)
  drift: ^2.18.0
  sqlcipher_flutter_libs: ^0.5.4
  sqlite3: ^2.4.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP client
  dio: ^5.4.3+1

  # JWT secure storage
  flutter_secure_storage: ^9.2.2

  # Offline connectivity monitoring
  connectivity_plus: ^6.0.3

  # UUID v4 generation
  uuid: ^4.4.0

  # Lightweight key-value store for non-sensitive prefs
  shared_preferences: ^2.3.2

  # Image picker for client photo
  image_picker: ^1.1.2

  # Date/number formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "../dashboard/public/web-app-manifest-512x512.png"
